<!DOCTYPE html>
<html>
<head>
    <title>2D Scatter Plot Iris</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h2>2D Scatter Plot: Sepal Length vs Sepal Width (Iris Dataset)</h2>
    <canvas id="irisChart" width="600" height="400"></canvas>

    <script>
        const ctx = document.getElementById('irisChart').getContext('2d');

        const irisData = [
            {x:5.1, y:3.5}, {x:4.9, y:3.0}, {x:4.7, y:3.2},
            {x:4.6, y:3.1}, {x:5.0, y:3.6}, {x:5.4, y:3.9},
            {x:4.6, y:3.4}, {x:5.0, y:3.4}, {x:4.4, y:2.9},
            {x:4.9, y:3.1}, {x:5.4, y:3.7}, {x:4.8, y:3.4},
            {x:4.8, y:3.0}, {x:4.3, y:3.0}, {x:5.8, y:4.0},
            {x:5.7, y:4.4}, {x:5.4, y:3.9}, {x:5.1, y:3.5},
            {x:7.0, y:3.2}, {x:6.4, y:3.2}, {x:6.9, y:3.1},
            {x:5.5, y:2.3}, {x:6.5, y:2.8}, {x:7.6, y:3.0},
            {x:7.3, y:2.9}, {x:6.7, y:2.5}, {x:6.3, y:3.3},
            {x:6.5, y:3.0}, {x:6.2, y:2.2}, {x:5.9, y:3.0},
            {x:6.0, y:2.2}, {x:6.1, y:2.9}, {x:5.6, y:2.9},
            {x:6.7, y:3.1}, {x:5.6, y:3.0}, {x:5.8, y:2.7},
            {x:6.2, y:2.8}, {x:6.4, y:3.2}, {x:7.9, y:3.8}
        ];

        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Sepal Length vs Sepal Width',
                    data: irisData,
                    backgroundColor: 'blue'
                }]
            },
            options: {
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Sepal Length'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Sepal Width'
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
